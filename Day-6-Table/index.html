<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section>
        <table border="1">
            <caption>
                Front-end web developer course 2021
            </caption>
            <tr>
                <!--  table head -->
                <th>S.No</th>
                <th>Player Name</th>
                <th>Score</th>
                <th>4s</th>
                <th>6s</th>
            </tr>
            <!--  table data -->
            <tr>
                <td>1</td>
                <td>Dhoni</td>
                <td>101*</td>
                <td>15</td>
                <td>8</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Virat Kohli</td>
                <td>51</td>
                <td>6</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Rohit Sharma</td>
                <td>141*</td>
                <td>16</td>
                <td>8</td>
            </tr>
        </table>
    </section>
</body>

</html>
