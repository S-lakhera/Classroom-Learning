<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="page-1">
        <div class="card">

            <!-- Personal Information Photo name & description -->
            <div class="personal-info">
                <div class="image-class">
                    <img src="./user2.avif" alt="User Image">
                </div>

                <div class="text">
                    <h2>Jofra Archer</h2>
                    <p > <b>@jofra.archar </b></p>
                    <p class="desc">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Delectus, vel?</p>
                </div>
            </div>

            <div class="social">
                <div class="row-1">
                    <div>
                        <h3>15K</h3>
                        <h3>Views</h3>
                    </div>
                    <div>
                        <h3>82</h3>
                        <h3>Projects</h3>
                    </div>
                    <div>
                        <h3>1.3M</h3>
                        <h3>Followers</h3>
                    </div>
                </div>
                <div>
                    <button class="btn-1">Follow</button>
                    <button class="btn-2">View Profile</button>
                </div>
            </div>

        </div>
    </section>
</body>
</html>
